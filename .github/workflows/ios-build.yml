name: iOS Build & TestFlight

on:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3'

      - name: Install iOS platform
        run: xcodebuild -downloadPlatform iOS

      - name: Flutter pub get + generate iOS configs
        run: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          flutter build ios --release --no-codesign || true

      - name: Fix Podfile
        run: cp ios/Podfile.ci ios/Podfile

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Remove broken asset catalogs from DK pods
        run: |
          find ios/Pods/DKPhotoGallery -name "Images.xcassets" -exec rm -rf {} + 2>/dev/null || true
          find ios/Pods/DKImagePickerController -name "Images.xcassets" -exec rm -rf {} + 2>/dev/null || true

      - name: Fix pbxproj deployment target
        run: |
          find ios -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' {} \;

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Build & Upload via Fastlane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY_B64 }}
        run: |
          cd ios
          fastlane build_and_upload
